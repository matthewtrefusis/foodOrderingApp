<header class="header">
  <div class="header-container">
    <a routerLink="/" class="header-logo">Food Ordering App</a>

    <nav class="header-nav" aria-label="Main navigation">
      <a routerLink="/" class="header-nav-link">Home</a>
      <a routerLink="/cart-page" class="header-nav-link">Cart</a>
    </nav>

    <div class="header-user-section">
      <input
        class="header-search"
        type="search"
        placeholder="Search food..."
        aria-label="Search menu"
      />
      <button class="header-button header-button-secondary" type="button">Login</button>
      <button class="header-button header-button-primary" type="button">Sign up</button>
      <button class="header-mobile-menu header-button header-button-secondary" type="button">
        Menu
      </button>
    </div>
  </div>
</header>
