<header class="header">
  <div class="header-container">
    <a routerLink="/" class="header-logo">Food Ordering App</a>

    <nav class="header-nav" aria-label="Main navigation">
      <a routerLink="/" class="header-nav-link">Home</a>
      <a routerLink="/cart" class="header-nav-link">
        Cart
        @if (cartService.totalItems() > 0) {
          <span class="cart-badge">{{ cartService.totalItems() }}</span>
        }
      </a>
    </nav>

    <div class="header-user-section">
      <input
        class="header-search"
        type="search"
        placeholder="Search food..."
        aria-label="Search menu"
        [value]="searchService.searchTerm()"
        (input)="searchService.setSearchTerm($any($event.target).value)"
      />
      @if (!authService.isAuthenticated()) {
        <button
          class="header-button header-button-secondary"
          type="button"
          (click)="navigateToLogin()"
        >
          Login
        </button>
        <button
          class="header-button header-button-primary"
          type="button"
          (click)="navigateToSignup()"
        >
          Sign up
        </button>
      } @else {
        <span class="header-user-info">Welcome, {{ authService.currentUser()?.name }}</span>
        <button class="header-button header-button-secondary" type="button" (click)="logout()">
          Logout
        </button>
      }
      <button class="header-mobile-menu header-button header-button-secondary" type="button">
        Menu
      </button>
    </div>
  </div>
</header>
